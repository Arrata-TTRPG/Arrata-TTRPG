# Thanks to https://github.com/NiklasEi/bevy_game_template/blob/main/.github/workflows/release.yaml for much of this code
on:
  push:
    # Sequence of patterns matched against refs/tags
    tags:
      - "v*" # Push events to matching v*, i.e. v1.0, v20.15.10
      - "V*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version - in the form of v1.2.3"
        required: true
        type: string

permissions: write-all

name: Create release
jobs:
  get-version:
    runs-on: ubuntu-latest
    steps:
      - name: Get tag
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
    outputs:
      version: ${{ inputs.version || steps.tag.outputs.tag }}

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: get-version
    env:
      VERSION: ${{needs.get-version.outputs.version}}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Generate a changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: cliff.toml
          args: --verbose --latest
        env:
          OUTPUT: CHANGELOG.md
      - name: Create release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # This token is provided by Actions, you do not need to create your own token
        with:
          tag_name: ${{ env.VERSION }}
          release_name: Release ${{ env.VERSION }}
          body_path: ${{ steps.git-cliff.outputs.changelog }}
          draft: false
          prerelease: false
      - name: Write CURRENT_VERSION
        run: |
          sed -i "s/CURRENT_VERSION/${{ env.VERSION }}/" src/main.typ
      - name: Install Typst
        uses: typst-community/setup-typst@v5
      - name: Compile Typst files
        run: |
          typst compile src/main.typ --root src
          for f in src/cards/*.typ; do typst compile "$f" --root src; done
      - name: Prepare release
        run: |
          mkdir release
          mv src/main.pdf release/arrata-${{ env.VERSION }}.pdf
          mv src/cards/armor.pdf release/armor-${{ env.VERSION }}.pdf
          mv src/cards/talents.pdf release/talents-${{ env.VERSION }}.pdf
          mv src/cards/weapons.pdf release/weapons-${{ env.VERSION }}.pdf
          mv src/cards/sorcery.pdf release/sorcery-${{ env.VERSION }}.pdf
          zip release/arrata-complete-${{ env.VERSION }}.zip release/*.pdf LICENSE.md
          mv LICENSE.md release/LICENSE.md
      - name: Upload release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file_glob: true
          file: release/*
          release_name: ${{ env.VERSION }}
          tag: ${{ env.VERSION }}
          overwrite: true
